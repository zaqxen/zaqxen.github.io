<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4f7fb" />
  <title>Ajman Bus Schedule</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f4f7fb;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --text: #172033;
      --muted: #64748b;
      --border: #dfe6ef;
      --shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--page-bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    .app-shell {
      width: min(1480px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1.5rem 0 3rem;
    }

    .page-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.35rem);
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .page-subtitle {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .current-time {
      flex: 0 0 auto;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 0.8rem;
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(23, 32, 51, 0.05);
      text-align: right;
    }

    .current-time-label {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #current-clock {
      display: block;
      font-variant-numeric: tabular-nums;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .section-heading {
      margin: 0 0 0.75rem;
      font-size: 1rem;
      font-weight: 800;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .next-bus-card {
      --accent: #64748b;
      --accent-soft: #f1f5f9;
      position: relative;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-left: 6px solid var(--accent);
      border-radius: 0.9rem;
      background: var(--surface);
      box-shadow: 0 5px 18px rgba(23, 32, 51, 0.055);
    }

    .next-bus-card.status-urgent {
      --accent: #dc2626;
      --accent-soft: #fee2e2;
    }

    .next-bus-card.status-soon {
      --accent: #ea580c;
      --accent-soft: #ffedd5;
    }

    .next-bus-card.status-medium {
      --accent: #ca8a04;
      --accent-soft: #fef9c3;
    }

    .next-bus-card.status-near {
      --accent: #2563eb;
      --accent-soft: #dbeafe;
    }

    .next-bus-card.status-later {
      --accent: #15803d;
      --accent-soft: #dcfce7;
    }

    .next-bus-card.status-none {
      --accent: #64748b;
      --accent-soft: #f1f5f9;
    }

    .card-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 0.95rem 0.65rem;
      border-bottom: 1px solid var(--border);
    }

    .route-name {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .route-destination {
      margin: 0.2rem 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .status-dot {
      width: 0.7rem;
      height: 0.7rem;
      margin-top: 0.25rem;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .urgent-flash .status-dot,
    .urgent-flash .countdown-badge {
      animation: urgentPulse 1s ease-in-out infinite;
    }

    @keyframes urgentPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.72; }
    }

    .departure-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .departure-item {
      min-width: 0;
      padding: 0.75rem 0.9rem 0.85rem;
    }

    .departure-item + .departure-item {
      border-left: 1px solid var(--border);
      background: var(--surface-muted);
    }

    .departure-label {
      display: block;
      margin-bottom: 0.2rem;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .departure-time {
      display: block;
      min-height: 1.5rem;
      overflow-wrap: anywhere;
      font-size: 0.98rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .departure-direction {
      display: block;
      min-height: 2.1em;
      margin-top: 0.2rem;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.7rem;
      line-height: 1.25;
    }

    .countdown-badge,
    .following-gap {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      margin-top: 0.5rem;
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.74rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .schedule-panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .table-responsive { margin: 0; }

    .bus-table {
      margin: 0;
      --bs-table-bg: transparent;
      --bs-table-striped-bg: #f8fafc;
      --bs-table-hover-bg: #f1f5f9;
    }

    .bus-table th {
      padding: 0.85rem 0.9rem;
      border-color: #334155;
      background: #1e293b;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.055em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .bus-table td {
      padding: 0.8rem 0.9rem;
      border-color: var(--border);
      vertical-align: middle;
      font-size: 0.9rem;
    }

    .route-cell { font-weight: 800; }
    .fare-cell { white-space: nowrap; }

    .schedule-toggle {
      white-space: nowrap;
      font-weight: 700;
    }

    .schedule-details td {
      padding: 0;
      background: #fbfdff !important;
    }

    .schedule-details-inner {
      padding: 1rem;
    }

    .schedule-group + .schedule-group {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .schedule-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .schedule-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .times {
      display: flex;
      flex-wrap: wrap;
      gap: 0.38rem;
    }

    .time-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 3.6rem;
      padding: 0.3rem 0.48rem;
      border: 1px solid var(--border);
      border-radius: 0.55rem;
      background: #fff;
      color: #334155;
      font-size: 0.78rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .time-chip.is-next {
      border-color: #2563eb;
      background: #dbeafe;
      color: #1d4ed8;
      box-shadow: inset 0 0 0 1px #2563eb;
    }

    .time-chip.is-following {
      border-color: #94a3b8;
      background: #f1f5f9;
      color: #334155;
    }

    .time-chip.is-past {
      opacity: 0.42;
      text-decoration: line-through;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem 0.9rem;
      margin: -0.35rem 0 1rem;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .legend-swatch {
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 999px;
      background: currentColor;
    }

    .fullscreen-button {
      position: fixed;
      right: 0.8rem;
      bottom: 0.8rem;
      z-index: 1050;
      display: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 0.8rem;
      font-weight: 800;
    }

    @media (max-width: 767.98px) {
      .app-shell {
        width: min(100% - 1rem, 760px);
        padding-top: 0.8rem;
      }

      .page-header {
        align-items: center;
        margin-bottom: 1rem;
      }

      .page-subtitle { font-size: 0.82rem; }
      .current-time { padding: 0.5rem 0.65rem; }
      .current-time-label { display: none; }
      #current-clock { font-size: 0.88rem; }

      .dashboard {
        grid-template-columns: 1fr;
        gap: 0.55rem;
      }

      .next-bus-card { border-radius: 0.75rem; }
      .card-heading { padding: 0.7rem 0.75rem 0.55rem; }
      .route-name { font-size: 0.93rem; }
      .departure-item { padding: 0.62rem 0.7rem 0.7rem; }
      .departure-time { font-size: 0.88rem; }
      .departure-direction { min-height: 0; }

      .bus-table th,
      .bus-table td {
        padding: 0.68rem 0.55rem;
        font-size: 0.78rem;
      }

      .schedule-toggle {
        padding: 0.3rem 0.48rem;
        font-size: 0.72rem;
      }

      .fullscreen-button { display: inline-flex; }
    }

    @media (max-width: 430px) {
      .page-header { align-items: flex-start; }
      .current-time { margin-top: 0.15rem; }
      .page-subtitle { max-width: 22rem; }
      .departure-direction { font-size: 0.66rem; }
      .countdown-badge, .following-gap { font-size: 0.68rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }


    /* Compact departure board: one route per slim row */
    .app-shell {
      width: min(1180px, calc(100% - 1rem));
      padding: 0.65rem 0 1.5rem;
    }

    .page-header {
      align-items: center;
      margin-bottom: 0.55rem;
    }

    .page-title {
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      letter-spacing: -0.025em;
    }

    .page-subtitle { display: none; }

    .current-time {
      padding: 0.38rem 0.6rem;
      border-radius: 0.6rem;
      box-shadow: none;
    }

    .current-time-label { display: none; }
    #current-clock { font-size: 0.86rem; }

    .section-heading {
      margin-bottom: 0.35rem;
      font-size: 0.88rem;
    }

    .legend {
      gap: 0.25rem 0.7rem;
      margin: 0 0 0.45rem;
      font-size: 0.68rem;
    }

    .legend-swatch {
      width: 0.52rem;
      height: 0.52rem;
    }

    .dashboard {
      display: block;
      overflow: hidden;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 0.7rem;
      background: var(--surface);
      box-shadow: 0 3px 12px rgba(23, 32, 51, 0.05);
    }

    .next-bus-card {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(170px, auto) minmax(145px, auto);
      align-items: center;
      gap: 0.8rem;
      min-height: 46px;
      padding: 0.38rem 0.7rem;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-left: 5px solid var(--accent);
      border-radius: 0;
      box-shadow: none;
    }

    .next-bus-card:last-child { border-bottom: 0; }

    .route-name {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.86rem;
      line-height: 1.15;
    }

    .compact-departure {
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      gap: 0.35rem;
      min-width: 0;
      white-space: nowrap;
    }

    .compact-label {
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .compact-time {
      overflow: hidden;
      color: var(--text);
      text-overflow: ellipsis;
      font-size: 0.84rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .countdown-badge {
      flex: 0 0 auto;
      margin: 0;
      padding: 0.22rem 0.42rem;
      font-size: 0.68rem;
    }

    .following-departure {
      justify-content: flex-end;
      color: var(--muted);
    }

    .following-departure .compact-time {
      color: var(--muted);
      font-weight: 700;
    }

    .urgent-flash .countdown-badge {
      animation: urgentPulse 1s ease-in-out infinite;
    }

    @media (max-width: 767.98px) {
      .app-shell {
        width: calc(100% - 0.5rem);
        padding-top: 0.35rem;
      }

      .page-header { margin-bottom: 0.4rem; }
      .page-title { font-size: 1.08rem; }
      .current-time { padding: 0.28rem 0.42rem; }
      #current-clock { font-size: 0.72rem; }
      .section-heading { font-size: 0.8rem; }

      .legend {
        gap: 0.2rem 0.5rem;
        font-size: 0.6rem;
      }

      .next-bus-card {
        grid-template-columns: minmax(112px, 1fr) minmax(128px, auto) minmax(94px, auto);
        gap: 0.35rem;
        min-height: 40px;
        padding: 0.3rem 0.42rem;
        border-left-width: 4px;
      }

      .route-name { font-size: 0.74rem; }
      .compact-departure { gap: 0.22rem; }
      .compact-label { font-size: 0.52rem; }
      .compact-time { font-size: 0.7rem; }
      .countdown-badge {
        padding: 0.18rem 0.32rem;
        font-size: 0.58rem;
      }
    }

    @media (max-width: 430px) {
      .legend-item:nth-child(3),
      .legend-item:nth-child(4) { display: none; }

      .next-bus-card {
        grid-template-columns: minmax(105px, 1fr) minmax(122px, auto) minmax(84px, auto);
      }

      .compact-label { display: none; }
      .following-departure::before {
        content: "Then";
        color: var(--muted);
        font-size: 0.52rem;
        font-weight: 800;
        text-transform: uppercase;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div>
        <h1 class="page-title">🚌 Ajman Bus Schedule</h1>
        <p class="page-subtitle">Live departures based on your device's local time.</p>
      </div>
      <div class="current-time" aria-label="Current local time">
        <span class="current-time-label">Current time</span>
        <time id="current-clock">--:--:--</time>
      </div>
    </header>

    <section aria-labelledby="next-departures-heading">
      <h2 id="next-departures-heading" class="section-heading">Next departures</h2>
      <div class="legend" aria-label="Departure urgency legend">
        <span class="legend-item" style="color:#dc2626"><span class="legend-swatch"></span>5 min or less</span>
        <span class="legend-item" style="color:#ea580c"><span class="legend-swatch"></span>Under 10 min</span>
        <span class="legend-item" style="color:#ca8a04"><span class="legend-swatch"></span>10–20 min</span>
        <span class="legend-item" style="color:#2563eb"><span class="legend-swatch"></span>20–30 min</span>
        <span class="legend-item" style="color:#15803d"><span class="legend-swatch"></span>More than 30 min</span>
      </div>
      <div id="dashboard" class="dashboard"></div>
    </section>

    <section aria-labelledby="all-routes-heading">
      <h2 id="all-routes-heading" class="section-heading">All routes and times</h2>
      <div class="schedule-panel">
        <div class="table-responsive">
          <table class="table table-striped table-hover bus-table align-middle">
            <thead>
              <tr>
                <th scope="col">Bus line</th>
                <th scope="col" class="d-none d-sm-table-cell">Destination</th>
                <th scope="col">Cash</th>
                <th scope="col" class="d-none d-md-table-cell">Masar</th>
                <th scope="col"><span class="visually-hidden">Schedule</span></th>
              </tr>
            </thead>
            <tbody id="bus-table-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <button id="fullscreen-button" type="button" class="btn fullscreen-button" aria-label="Open full screen">
    ⛶ Full screen
  </button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    { line: "Sharjah (SHJ1)", destination: "Sharjah", fareCash: "9 AED", fareMasar: "9 AED",
      schedules: [{ title: "From Al Musalla Station", link: "#", times: ["06:00","06:20","06:40","07:00","07:20","07:40","08:00","08:20","08:40","09:00","09:20","09:40","10:00","10:20","10:40","11:00","11:20","11:40","12:00","12:20","12:40","13:00","13:20","13:40","14:00","14:20","14:40","15:00","15:20","15:40","16:00","16:20","16:40","17:00","17:20","17:40","18:00","18:20","18:40","19:00","19:20","19:40","20:00","20:20","20:40","21:00","21:20","21:40","22:00","22:20","22:40","23:00"] }] },
    { line: "Centrepoint (DXB1)", destination: "Rashidiya Metro", fareCash: "15 AED", fareMasar: "15 AED",
      schedules: [{ title: "From Al Musalla Station", link: "#", times: ["05:45","06:15","06:45","07:15","07:45","08:15","08:45","09:15","09:45","10:15","10:45","11:15","11:45","12:15","12:45","13:15","13:45","14:15","14:45","15:15","15:45","16:15","16:45","17:15","17:45","18:15","18:45","19:15","19:45","20:15","20:45","21:15","21:45","22:15","22:45"] }] },
    { line: "Umm Al Quwain (UAQ)", destination: "Umm Al Quwain", fareCash: "15 AED", fareMasar: "15 AED",
      schedules: [{ title: "From Al Musalla Station", link: "#", times: ["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00"] }] },
    { line: "Hamidiya Feeder", destination: "ADNOC Al Muntazi", fareCash: "3 AED", fareMasar: "3 AED",
      schedules: [{ title: "From ADNOC Al Muntazi", link: "#", times: ["06:00","06:45","07:30","08:15","09:00","09:45","10:30","11:15","12:00","12:45","13:30","14:15","15:45","16:30","17:15","18:00","18:45","19:30","20:15","21:00","21:45","22:30","23:15","23:50"] }] },
    // ✅ MERGED Global Village
    { line: "Global Village", destination: "Global Village", fareCash: "25 AED", fareMasar: "25 AED",
      schedules: [
        { title: "Weekday - From Al Musalla Station", link: "#", times: ["14:15","16:45","18:15"] },
        { title: "Weekday - From Global Village", link: "#", times: ["15:45","22:30","00:30"] },
        { title: "Weekend - From Al Musalla Station", link: "#", times: ["14:15","16:45","18:45"] },
        { title: "Weekend - From Global Village", link: "#", times: ["15:45","22:30","01:30"] }
      ] }
  ];

    // This board shows departures from Al Musalla only. Remove return-direction
    // schedules and shorten schedule headings because the origin is understood.
    routes.forEach(route => {
      route.schedules = route.schedules.filter(schedule =>
        !/from\s+(abu dhabi|global village)/i.test(schedule.title)
      );

      route.schedules.forEach(schedule => {
        if (/weekend/i.test(schedule.title)) schedule.title = "Weekend";
        else if (/weekday/i.test(schedule.title)) schedule.title = "Weekday";
        else schedule.title = "Daily";
      });
    });

    const STATUS_CLASSES = [
      "status-urgent",
      "status-soon",
      "status-medium",
      "status-near",
      "status-later",
      "status-none"
    ];

    const previousUrgentState = new Map();
    const lastVibrationAt = new Map();
    let lastHighlightedMinute = -1;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function routeDomId(route, index) {
      const slug = route.line
        .toLowerCase()
        .normalize("NFKD")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
      return `${slug || "route"}-${index}`;
    }

    function startOfDay(date) {
      const result = new Date(date);
      result.setHours(0, 0, 0, 0);
      return result;
    }

    function addDays(date, amount) {
      const result = new Date(date);
      result.setDate(result.getDate() + amount);
      return result;
    }

    // Preserves the original schedule rule: Friday and Saturday are treated as weekend.
    function isWeekendDate(date) {
      const day = date.getDay();
      return day === 5 || day === 6;
    }

    function scheduleAppliesToDate(schedule, serviceDate) {
      const title = schedule.title.toLowerCase();
      if (title.includes("weekend")) return isWeekendDate(serviceDate);
      if (title.includes("weekday")) return !isWeekendDate(serviceDate);
      return true;
    }

    function cleanScheduleTitle(title) {
      return title.replace(/^(weekday|weekend)\s*-\s*/i, "");
    }

    function timeOnServiceDate(timeString, serviceDate, schedule) {
      const [hours, minutes] = timeString.split(":").map(Number);
      const departure = startOfDay(serviceDate);
      departure.setHours(hours, minutes, 0, 0);

      // Global Village departures after midnight belong to the previous service evening.
      const isDayTagged = /weekday|weekend/i.test(schedule.title);
      if (isDayTagged && hours < 4) departure.setDate(departure.getDate() + 1);

      return departure;
    }

    function getUpcomingDepartures(route, now, limit = 2) {
      const byTimestamp = new Map();
      const today = startOfDay(now);

      // Include yesterday for after-midnight services, plus enough future days to
      // always find a next and following departure.
      for (let dayOffset = -1; dayOffset <= 3; dayOffset += 1) {
        const serviceDate = addDays(today, dayOffset);

        route.schedules.forEach(schedule => {
          if (!scheduleAppliesToDate(schedule, serviceDate)) return;

          schedule.times.forEach(timeString => {
            const departure = timeOnServiceDate(timeString, serviceDate, schedule);
            if (departure <= now) return;

            const timestamp = departure.getTime();
            const direction = cleanScheduleTitle(schedule.title);

            if (!byTimestamp.has(timestamp)) {
              byTimestamp.set(timestamp, {
                date: departure,
                directions: new Set([direction])
              });
            } else {
              byTimestamp.get(timestamp).directions.add(direction);
            }
          });
        });
      }

      return [...byTimestamp.values()]
        .sort((a, b) => a.date - b.date)
        .slice(0, limit)
        .map(item => ({
          date: item.date,
          direction: [...item.directions].join(" • ")
        }));
    }

    function sameCalendarDay(a, b) {
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    function formatClockTime(date, includeSeconds = false) {
      const parts = [
        String(date.getHours()).padStart(2, "0"),
        String(date.getMinutes()).padStart(2, "0")
      ];
      if (includeSeconds) parts.push(String(date.getSeconds()).padStart(2, "0"));
      return parts.join(":");
    }

    function formatDeparture(date, now) {
      if (sameCalendarDay(date, now)) return formatClockTime(date);

      const tomorrow = addDays(startOfDay(now), 1);
      if (sameCalendarDay(date, tomorrow)) return `Tomorrow ${formatClockTime(date)}`;

      return `${date.toLocaleDateString([], { weekday: "short" })} ${formatClockTime(date)}`;
    }

    function secondsUntil(departure, now) {
      const milliseconds = departure.getTime() - now.getTime();
      if (!Number.isFinite(milliseconds)) return Number.POSITIVE_INFINITY;
      return Math.max(0, Math.ceil(milliseconds / 1000));
    }

    function formatCountdown(totalSeconds) {
      if (!Number.isFinite(totalSeconds)) return "—";
      if (totalSeconds <= 0) return "Now";

      if (totalSeconds < 600) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}m ${String(seconds).padStart(2, "0")}s`;
      }

      const totalMinutes = Math.ceil(totalSeconds / 60);
      if (totalMinutes >= 60) {
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return minutes ? `${hours}h ${minutes}m` : `${hours}h`;
      }

      return `${totalMinutes} min`;
    }

    function statusClass(totalSeconds) {
      if (totalSeconds <= 300) return "status-urgent";
      if (totalSeconds < 600) return "status-soon";
      if (totalSeconds <= 1200) return "status-medium";
      if (totalSeconds <= 1800) return "status-near";
      return "status-later";
    }

    function renderDashboard() {
      const dashboard = document.getElementById("dashboard");

      routes.forEach((route, index) => {
        const id = routeDomId(route, index);
        dashboard.insertAdjacentHTML("beforeend", `
          <article class="next-bus-card status-none" id="card-${id}" title="${escapeHtml(route.line)}">
            <h3 class="route-name">${escapeHtml(route.line)}</h3>
            <div class="compact-departure next-departure">
              <span class="compact-label">Next</span>
              <time class="compact-time next-time">Checking…</time>
              <span class="countdown-badge next-countdown">—</span>
            </div>
            <div class="compact-departure following-departure">
              <span class="compact-label">Then</span>
              <time class="compact-time following-time">Checking…</time>
            </div>
          </article>
        `);
      });
    }

    function renderTable() {
      const tbody = document.getElementById("bus-table-body");

      routes.forEach((route, routeIndex) => {
        const id = routeDomId(route, routeIndex);
        const collapseId = `schedule-${id}`;
        const scheduleGroups = route.schedules.map((schedule, scheduleIndex) => {
          const externalLink = schedule.link && schedule.link !== "#"
            ? `<a class="btn btn-sm btn-outline-secondary" href="${escapeHtml(schedule.link)}" target="_blank" rel="noopener">Source</a>`
            : "";

          const timeChips = schedule.times.map(time => `
            <time class="time-chip" data-time="${escapeHtml(time)}">${escapeHtml(time)}</time>
          `).join("");

          return `
            <div class="schedule-group" data-route-index="${routeIndex}" data-schedule-index="${scheduleIndex}">
              <div class="schedule-title-row">
                <h3 class="schedule-title">${escapeHtml(schedule.title)}</h3>
                ${externalLink}
              </div>
              <div class="times">${timeChips}</div>
            </div>
          `;
        }).join("");

        tbody.insertAdjacentHTML("beforeend", `
          <tr>
            <td class="route-cell">${escapeHtml(route.line)}</td>
            <td class="d-none d-sm-table-cell">${escapeHtml(route.destination)}</td>
            <td class="fare-cell">${escapeHtml(route.fareCash)}</td>
            <td class="fare-cell d-none d-md-table-cell">${escapeHtml(route.fareMasar)}</td>
            <td class="text-end">
              <button
                type="button"
                class="btn btn-sm btn-outline-primary schedule-toggle"
                data-bs-toggle="collapse"
                data-bs-target="#${collapseId}"
                aria-expanded="false"
                aria-controls="${collapseId}"
              >
                View times
              </button>
            </td>
          </tr>
          <tr class="collapse schedule-details" id="${collapseId}">
            <td colspan="5">
              <div class="schedule-details-inner">${scheduleGroups}</div>
            </td>
          </tr>
        `);
      });
    }

    function updateDashboard(now = new Date()) {
      document.getElementById("current-clock").textContent = formatClockTime(now, true);
      document.getElementById("current-clock").dateTime = now.toISOString();

      routes.forEach((route, index) => {
        const card = document.getElementById(`card-${routeDomId(route, index)}`);
        if (!card) return;

        const departures = getUpcomingDepartures(route, now, 2);
        const next = departures[0];
        const following = departures[1];

        card.classList.remove(...STATUS_CLASSES, "urgent-flash");

        if (!next) {
          card.classList.add("status-none");
          card.querySelector(".next-time").textContent = "No service found";
          card.querySelector(".next-countdown").textContent = "—";
          card.querySelector(".following-time").textContent = "—";
          return;
        }

        const totalSecondsToNext = secondsUntil(next.date, now);
        const currentStatus = statusClass(totalSecondsToNext);
        const isUrgent = totalSecondsToNext <= 5 * 60;

        card.classList.add(currentStatus);
        card.classList.toggle("urgent-flash", isUrgent);

        const nextTime = card.querySelector(".next-time");
        nextTime.textContent = formatDeparture(next.date, now);
        nextTime.dateTime = next.date.toISOString();
        card.querySelector(".next-countdown").textContent = formatCountdown(totalSecondsToNext);

        const followingTime = card.querySelector(".following-time");
        if (following) {
          followingTime.textContent = formatDeparture(following.date, now);
          followingTime.dateTime = following.date.toISOString();

        } else {
          followingTime.textContent = "No later service found";
          followingTime.removeAttribute("datetime");

        }

        const routeKey = route.line;
        const wasUrgent = previousUrgentState.get(routeKey) === true;
        if (isUrgent && !wasUrgent) {
          const nowMs = Date.now();
          const previousVibration = lastVibrationAt.get(routeKey) || 0;
          if ("vibrate" in navigator && nowMs - previousVibration > 60000) {
            navigator.vibrate([180, 100, 180]);
            lastVibrationAt.set(routeKey, nowMs);
          }
        }
        previousUrgentState.set(routeKey, isUrgent);
      });
    }

    function updateTableHighlights(now = new Date()) {
      document.querySelectorAll(".schedule-group").forEach(group => {
        const routeIndex = Number(group.dataset.routeIndex);
        const scheduleIndex = Number(group.dataset.scheduleIndex);
        const schedule = routes[routeIndex].schedules[scheduleIndex];
        const serviceDate = startOfDay(now);
        const appliesToday = scheduleAppliesToDate(schedule, serviceDate);

        const chips = [...group.querySelectorAll(".time-chip")];
        chips.forEach(chip => chip.classList.remove("is-next", "is-following", "is-past"));

        if (!appliesToday) return;

        const futureChips = [];
        chips.forEach(chip => {
          const departure = timeOnServiceDate(chip.dataset.time, serviceDate, schedule);
          if (departure <= now) chip.classList.add("is-past");
          else futureChips.push(chip);
        });

        futureChips[0]?.classList.add("is-next");
        futureChips[1]?.classList.add("is-following");
      });
    }

    function initFullscreenButton() {
      const button = document.getElementById("fullscreen-button");
      const requestFullscreen = document.documentElement.requestFullscreen
        || document.documentElement.webkitRequestFullscreen;

      if (!requestFullscreen) {
        button.remove();
        return;
      }

      button.addEventListener("click", async () => {
        try {
          if (document.fullscreenElement || document.webkitFullscreenElement) {
            const exit = document.exitFullscreen || document.webkitExitFullscreen;
            await exit.call(document);
          } else {
            await requestFullscreen.call(document.documentElement);
          }
        } catch (error) {
          console.warn("Fullscreen request was not completed.", error);
        }
      });

      const syncLabel = () => {
        const isFullscreen = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
        button.textContent = isFullscreen ? "× Exit full screen" : "⛶ Full screen";
      };

      document.addEventListener("fullscreenchange", syncLabel);
      document.addEventListener("webkitfullscreenchange", syncLabel);
    }

    function init() {
      renderDashboard();
      renderTable();
      initFullscreenButton();

      const now = new Date();
      updateDashboard(now);
      updateTableHighlights(now);
      lastHighlightedMinute = now.getMinutes();

      window.setInterval(() => {
        const tick = new Date();
        updateDashboard(tick);

        if (tick.getMinutes() !== lastHighlightedMinute) {
          updateTableHighlights(tick);
          lastHighlightedMinute = tick.getMinutes();
        }
      }, 1000);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
