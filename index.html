<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f4f7fb" />
  <title>Ajman Bus Schedule</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f4f7fb;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --text: #172033;
      --muted: #64748b;
      --border: #dfe6ef;
      --shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--page-bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    .app-shell {
      width: min(1480px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1.5rem 0 3rem;
    }

    .page-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.35rem);
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .page-subtitle {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .current-time {
      flex: 0 0 auto;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 0.8rem;
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(23, 32, 51, 0.05);
      text-align: right;
    }

    .current-time-label {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #current-clock {
      display: block;
      font-variant-numeric: tabular-nums;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .section-heading {
      margin: 0 0 0.75rem;
      font-size: 1rem;
      font-weight: 800;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .next-bus-card {
      --accent: #64748b;
      --accent-soft: #f1f5f9;
      position: relative;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-left: 6px solid var(--accent);
      border-radius: 0.9rem;
      background: var(--surface);
      box-shadow: 0 5px 18px rgba(23, 32, 51, 0.055);
    }

    .next-bus-card.status-urgent {
      --accent: #dc2626;
      --accent-soft: #fee2e2;
    }

    .next-bus-card.status-soon {
      --accent: #ea580c;
      --accent-soft: #ffedd5;
    }

    .next-bus-card.status-medium {
      --accent: #ca8a04;
      --accent-soft: #fef9c3;
    }

    .next-bus-card.status-near {
      --accent: #2563eb;
      --accent-soft: #dbeafe;
    }

    .next-bus-card.status-later {
      --accent: #15803d;
      --accent-soft: #dcfce7;
    }

    .next-bus-card.status-none {
      --accent: #64748b;
      --accent-soft: #f1f5f9;
    }

    .card-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 0.95rem 0.65rem;
      border-bottom: 1px solid var(--border);
    }

    .route-name {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .route-destination {
      margin: 0.2rem 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .status-dot {
      width: 0.7rem;
      height: 0.7rem;
      margin-top: 0.25rem;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .urgent-flash .status-dot,
    .urgent-flash .countdown-badge {
      animation: urgentPulse 1s ease-in-out infinite;
    }

    @keyframes urgentPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.72; }
    }

    .departure-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .departure-item {
      min-width: 0;
      padding: 0.75rem 0.9rem 0.85rem;
    }

    .departure-item + .departure-item {
      border-left: 1px solid var(--border);
      background: var(--surface-muted);
    }

    .departure-label {
      display: block;
      margin-bottom: 0.2rem;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .departure-time {
      display: block;
      min-height: 1.5rem;
      overflow-wrap: anywhere;
      font-size: 0.98rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .departure-direction {
      display: block;
      min-height: 2.1em;
      margin-top: 0.2rem;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.7rem;
      line-height: 1.25;
    }

    .countdown-badge,
    .following-gap {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      margin-top: 0.5rem;
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.74rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .schedule-panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .table-responsive { margin: 0; }

    .bus-table {
      margin: 0;
      --bs-table-bg: transparent;
      --bs-table-striped-bg: #f8fafc;
      --bs-table-hover-bg: #f1f5f9;
    }

    .bus-table th {
      padding: 0.85rem 0.9rem;
      border-color: #334155;
      background: #1e293b;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.055em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .bus-table td {
      padding: 0.8rem 0.9rem;
      border-color: var(--border);
      vertical-align: middle;
      font-size: 0.9rem;
    }

    .route-cell { font-weight: 800; }
    .fare-cell { white-space: nowrap; }

    .schedule-toggle {
      white-space: nowrap;
      font-weight: 700;
    }

    .schedule-details td {
      padding: 0;
      background: #fbfdff !important;
    }

    .schedule-details-inner {
      padding: 1rem;
    }

    .schedule-group + .schedule-group {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .schedule-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .schedule-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .times {
      display: flex;
      flex-wrap: wrap;
      gap: 0.38rem;
    }

    .time-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 3.6rem;
      padding: 0.3rem 0.48rem;
      border: 1px solid var(--border);
      border-radius: 0.55rem;
      background: #fff;
      color: #334155;
      font-size: 0.78rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .time-chip.is-next {
      border-color: #2563eb;
      background: #dbeafe;
      color: #1d4ed8;
      box-shadow: inset 0 0 0 1px #2563eb;
    }

    .time-chip.is-following {
      border-color: #94a3b8;
      background: #f1f5f9;
      color: #334155;
    }

    .time-chip.is-past {
      opacity: 0.42;
      text-decoration: line-through;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem 0.9rem;
      margin: -0.35rem 0 1rem;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .legend-swatch {
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 999px;
      background: currentColor;
    }

    .fullscreen-button {
      position: fixed;
      right: 0.8rem;
      bottom: 0.8rem;
      z-index: 1050;
      display: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 0.8rem;
      font-weight: 800;
    }

    @media (max-width: 767.98px) {
      .app-shell {
        width: min(100% - 1rem, 760px);
        padding-top: 0.8rem;
      }

      .page-header {
        align-items: center;
        margin-bottom: 1rem;
      }

      .page-subtitle { font-size: 0.82rem; }
      .current-time { padding: 0.5rem 0.65rem; }
      .current-time-label { display: none; }
      #current-clock { font-size: 0.88rem; }

      .dashboard {
        grid-template-columns: 1fr;
        gap: 0.55rem;
      }

      .next-bus-card { border-radius: 0.75rem; }
      .card-heading { padding: 0.7rem 0.75rem 0.55rem; }
      .route-name { font-size: 0.93rem; }
      .departure-item { padding: 0.62rem 0.7rem 0.7rem; }
      .departure-time { font-size: 0.88rem; }
      .departure-direction { min-height: 0; }

      .bus-table th,
      .bus-table td {
        padding: 0.68rem 0.55rem;
        font-size: 0.78rem;
      }

      .schedule-toggle {
        padding: 0.3rem 0.48rem;
        font-size: 0.72rem;
      }

      .fullscreen-button { display: inline-flex; }
    }

    @media (max-width: 430px) {
      .page-header { align-items: flex-start; }
      .current-time { margin-top: 0.15rem; }
      .page-subtitle { max-width: 22rem; }
      .departure-direction { font-size: 0.66rem; }
      .countdown-badge, .following-gap { font-size: 0.68rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }


    /* Compact departure board: one route per slim row */
    .app-shell {
      width: min(1180px, calc(100% - 1rem));
      padding: 0.65rem 0 1.5rem;
    }

    .page-header {
      align-items: center;
      margin-bottom: 0.55rem;
    }

    .page-title {
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      letter-spacing: -0.025em;
    }

    .page-subtitle { display: none; }

    .current-time {
      padding: 0.38rem 0.6rem;
      border-radius: 0.6rem;
      box-shadow: none;
    }

    .current-time-label { display: none; }
    #current-clock { font-size: 0.86rem; }

    .section-heading {
      margin-bottom: 0.35rem;
      font-size: 0.88rem;
    }

    .legend {
      gap: 0.25rem 0.7rem;
      margin: 0 0 0.45rem;
      font-size: 0.68rem;
    }

    .legend-swatch {
      width: 0.52rem;
      height: 0.52rem;
    }

    .dashboard {
      display: block;
      overflow: hidden;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 0.7rem;
      background: var(--surface);
      box-shadow: 0 3px 12px rgba(23, 32, 51, 0.05);
    }

    .next-bus-card {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(170px, auto) minmax(145px, auto);
      align-items: center;
      gap: 0.8rem;
      min-height: 46px;
      padding: 0.38rem 0.7rem;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-left: 5px solid var(--accent);
      border-radius: 0;
      box-shadow: none;
    }

    .next-bus-card:last-child { border-bottom: 0; }

    .route-name {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.86rem;
      line-height: 1.15;
    }

    .compact-departure {
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      gap: 0.35rem;
      min-width: 0;
      white-space: nowrap;
    }

    .compact-label {
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .compact-time {
      overflow: hidden;
      color: var(--text);
      text-overflow: ellipsis;
      font-size: 0.84rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .countdown-badge {
      flex: 0 0 auto;
      margin: 0;
      padding: 0.22rem 0.42rem;
      font-size: 0.68rem;
    }

    .following-departure {
      justify-content: flex-end;
      color: var(--muted);
    }

    .following-departure .compact-time {
      color: var(--muted);
      font-weight: 700;
    }

    .urgent-flash .countdown-badge {
      animation: urgentPulse 1s ease-in-out infinite;
    }

    @media (max-width: 767.98px) {
      .app-shell {
        width: calc(100% - 0.5rem);
        padding-top: 0.35rem;
      }

      .page-header { margin-bottom: 0.4rem; }
      .page-title { font-size: 1.08rem; }
      .current-time { padding: 0.28rem 0.42rem; }
      #current-clock { font-size: 0.72rem; }
      .section-heading { font-size: 0.8rem; }

      .legend {
        gap: 0.2rem 0.5rem;
        font-size: 0.6rem;
      }

      .next-bus-card {
        grid-template-columns: minmax(112px, 1fr) minmax(128px, auto) minmax(94px, auto);
        gap: 0.35rem;
        min-height: 40px;
        padding: 0.3rem 0.42rem;
        border-left-width: 4px;
      }

      .route-name { font-size: 0.74rem; }
      .compact-departure { gap: 0.22rem; }
      .compact-label { font-size: 0.52rem; }
      .compact-time { font-size: 0.7rem; }
      .countdown-badge {
        padding: 0.18rem 0.32rem;
        font-size: 0.58rem;
      }
    }

    @media (max-width: 430px) {
      .legend-item:nth-child(3),
      .legend-item:nth-child(4) { display: none; }

      .next-bus-card {
        grid-template-columns: minmax(105px, 1fr) minmax(122px, auto) minmax(84px, auto);
      }

      .compact-label { display: none; }
      .following-departure::before {
        content: "Then";
        color: var(--muted);
        font-size: 0.52rem;
        font-weight: 800;
        text-transform: uppercase;
      }
    }


    /* Swipe-left notification controls. The action tray sits behind the row, so
       route height stays unchanged. */
    .next-bus-card {
      --actions-width: 224px;
      display: block;
      position: relative;
      padding: 0;
      background: var(--surface-muted);
      touch-action: pan-y;
    }

    .next-bus-card.has-reminder { --actions-width: 146px; }

    .card-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(170px, auto) minmax(145px, auto);
      align-items: center;
      gap: 0.8rem;
      min-height: 46px;
      padding: 0.38rem 0.7rem;
      background: var(--surface);
      cursor: grab;
      touch-action: pan-y;
      user-select: none;
      transition: transform 180ms ease;
      will-change: transform;
    }

    .next-bus-card.actions-open .card-content {
      transform: translateX(calc(-1 * var(--actions-width)));
    }

    .next-bus-card.is-dragging .card-content {
      cursor: grabbing;
      transition: none;
    }

    .notification-actions {
      position: absolute;
      z-index: 1;
      inset: 0 0 0 auto;
      display: flex;
      width: var(--actions-width);
      min-width: 0;
      align-items: stretch;
      justify-content: flex-end;
      background: #eef2f7;
    }

    .reminder-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      width: 100%;
    }

    .reminder-action,
    .reminder-cancel {
      min-width: 0;
      border: 0;
      border-left: 1px solid #d7dee8;
      border-radius: 0;
      font: inherit;
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1.05;
      touch-action: manipulation;
    }

    .reminder-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.12rem;
      padding: 0.2rem 0.24rem;
      background: #e8f1ff;
      color: #1d4ed8;
    }

    .reminder-action strong {
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
    }

    .reminder-action:hover,
    .reminder-action:focus-visible { background: #dbeafe; }

    .reminder-cancel {
      display: none;
      width: 100%;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0.45rem;
      background: #fee2e2;
      color: #b91c1c;
    }

    .reminder-cancel:hover,
    .reminder-cancel:focus-visible { background: #fecaca; }

    .next-bus-card.has-reminder .reminder-options { display: none; }
    .next-bus-card.has-reminder .reminder-cancel { display: flex; }

    .reminder-action:disabled,
    .reminder-cancel:disabled {
      cursor: wait;
      opacity: 0.55;
    }

    .reminder-indicator {
      display: none;
      flex: 0 0 auto;
      align-items: center;
      padding: 0.16rem 0.3rem;
      border-radius: 999px;
      background: #ede9fe;
      color: #6d28d9;
      font-size: 0.58rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .next-bus-card.has-reminder .reminder-indicator { display: inline-flex; }

    .notification-toast {
      position: fixed;
      z-index: 2000;
      left: 50%;
      bottom: 1rem;
      width: min(92vw, 520px);
      padding: 0.7rem 0.85rem;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      background: #172033;
      color: #fff;
      box-shadow: 0 12px 35px rgba(15, 23, 42, 0.3);
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 0.65rem);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .notification-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .notification-toast.is-error {
      border-color: #ef4444;
      background: #7f1d1d;
    }

    @media (max-width: 767.98px) {
      .next-bus-card { --actions-width: 190px; }
      .next-bus-card.has-reminder { --actions-width: 124px; }

      .card-content {
        grid-template-columns: minmax(112px, 1fr) minmax(128px, auto) minmax(94px, auto);
        gap: 0.35rem;
        min-height: 40px;
        padding: 0.3rem 0.42rem;
      }

      .reminder-action,
      .reminder-cancel { font-size: 0.58rem; }
      .reminder-action strong { font-size: 0.68rem; }
    }

    @media (max-width: 430px) {
      .card-content {
        grid-template-columns: minmax(105px, 1fr) minmax(122px, auto) minmax(84px, auto);
      }

      .reminder-indicator { font-size: 0.52rem; }
    }

  </style>
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div>
        <h1 class="page-title">🚌 Ajman Bus Schedule</h1>
        <p class="page-subtitle">Live departures based on your device's local time.</p>
      </div>
      <div class="current-time" aria-label="Current local time">
        <span class="current-time-label">Current time</span>
        <time id="current-clock">--:--:--</time>
      </div>
    </header>

    <section aria-labelledby="next-departures-heading">
      <h2 id="next-departures-heading" class="section-heading">Next departures</h2>
      <div class="legend" aria-label="Departure urgency legend">
        <span class="legend-item" style="color:#dc2626"><span class="legend-swatch"></span>5 min or less</span>
        <span class="legend-item" style="color:#ea580c"><span class="legend-swatch"></span>Under 10 min</span>
        <span class="legend-item" style="color:#ca8a04"><span class="legend-swatch"></span>10–20 min</span>
        <span class="legend-item" style="color:#2563eb"><span class="legend-swatch"></span>20–30 min</span>
        <span class="legend-item" style="color:#15803d"><span class="legend-swatch"></span>More than 30 min</span>
      </div>
      <div id="dashboard" class="dashboard"></div>
    </section>

    <section aria-labelledby="all-routes-heading">
      <h2 id="all-routes-heading" class="section-heading">All routes and times</h2>
      <div class="schedule-panel">
        <div class="table-responsive">
          <table class="table table-striped table-hover bus-table align-middle">
            <thead>
              <tr>
                <th scope="col">Bus line</th>
                <th scope="col" class="d-none d-sm-table-cell">Destination</th>
                <th scope="col">Cash</th>
                <th scope="col" class="d-none d-md-table-cell">Masar</th>
                <th scope="col"><span class="visually-hidden">Schedule</span></th>
              </tr>
            </thead>
            <tbody id="bus-table-body"></tbody>
          </table>

        { title: "Weekend - From Global Village", link: "#", times: ["15:45","22:30","01:30"] }

    // This board shows departures from Al Musalla only. Remove return-direction
    // schedules and shorten schedule headings because the origin is understood.
    routes.forEach(route => {
      route.schedules = route.schedules.filter(schedule =>
        !/from\s+(abu dhabi|global village)/i.test(schedule.title)
      );

      route.schedules.forEach(schedule => {
        if (/weekend/i.test(schedule.title)) schedule.title = "Weekend";
        else if (/weekday/i.test(schedule.title)) schedule.title = "Weekday";
        else schedule.title = "Daily";
      });
    });

    const STATUS_CLASSES = [
      "status-urgent",
      "status-soon",
      "status-medium",
      "status-near",
      "status-later",
      "status-none"
    ];

    const REMINDER_STORAGE_KEY = "ajman-bus-reminders-v1";
    const remindersByRoute = new Map();
    let serviceWorkerRegistration = null;
    let lastHighlightedMinute = -1;
    let toastTimer = 0;
    let reminderCheckInProgress = false;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function routeDomId(route, index) {
      const slug = route.line
        .toLowerCase()
        .normalize("NFKD")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
      return `${slug || "route"}-${index}`;
    }

    function startOfDay(date) {
      const result = new Date(date);
      result.setHours(0, 0, 0, 0);
      return result;
    }

    function addDays(date, amount) {
      const result = new Date(date);
      result.setDate(result.getDate() + amount);
      return result;
    }

    // Preserves the original schedule rule: Friday and Saturday are treated as weekend.
    function isWeekendDate(date) {
      const day = date.getDay();
      return day === 5 || day === 6;
    }

    function scheduleAppliesToDate(schedule, serviceDate) {
      const title = schedule.title.toLowerCase();
      if (title.includes("weekend")) return isWeekendDate(serviceDate);
      if (title.includes("weekday")) return !isWeekendDate(serviceDate);
      return true;
    }

    function cleanScheduleTitle(title) {
      return title.replace(/^(weekday|weekend)\s*-\s*/i, "");
    }

    function timeOnServiceDate(timeString, serviceDate, schedule) {
      const [hours, minutes] = timeString.split(":").map(Number);
      const departure = startOfDay(serviceDate);
      departure.setHours(hours, minutes, 0, 0);

      // Global Village departures after midnight belong to the previous service evening.
      const isDayTagged = /weekday|weekend/i.test(schedule.title);
      if (isDayTagged && hours < 4) departure.setDate(departure.getDate() + 1);

      return departure;
    }

    function getUpcomingDepartures(route, now, limit = 2) {
      const byTimestamp = new Map();
      const today = startOfDay(now);

      // Include yesterday for after-midnight services, plus enough future days to
      // always find a next and following departure.
      for (let dayOffset = -1; dayOffset <= 3; dayOffset += 1) {
        const serviceDate = addDays(today, dayOffset);

        route.schedules.forEach(schedule => {
          if (!scheduleAppliesToDate(schedule, serviceDate)) return;

          schedule.times.forEach(timeString => {
            const departure = timeOnServiceDate(timeString, serviceDate, schedule);
            if (departure <= now) return;

            const timestamp = departure.getTime();
            const direction = cleanScheduleTitle(schedule.title);

            if (!byTimestamp.has(timestamp)) {
              byTimestamp.set(timestamp, {
                date: departure,
                directions: new Set([direction])
              });
            } else {
              byTimestamp.get(timestamp).directions.add(direction);
            }
          });
        });
      }

      return [...byTimestamp.values()]
        .sort((a, b) => a.date - b.date)
        .slice(0, limit)
        .map(item => ({
          date: item.date,
          direction: [...item.directions].join(" • ")
        }));
    }

    function sameCalendarDay(a, b) {
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    function formatClockTime(date, includeSeconds = false) {
      const parts = [
        String(date.getHours()).padStart(2, "0"),
        String(date.getMinutes()).padStart(2, "0")
      ];
      if (includeSeconds) parts.push(String(date.getSeconds()).padStart(2, "0"));
      return parts.join(":");
    }

    function formatDeparture(date, now) {
      if (sameCalendarDay(date, now)) return formatClockTime(date);

      const tomorrow = addDays(startOfDay(now), 1);
      if (sameCalendarDay(date, tomorrow)) return `Tomorrow ${formatClockTime(date)}`;

      return `${date.toLocaleDateString([], { weekday: "short" })} ${formatClockTime(date)}`;
    }

    function secondsUntil(departure, now) {
      const milliseconds = departure.getTime() - now.getTime();
      if (!Number.isFinite(milliseconds)) return Number.POSITIVE_INFINITY;
      return Math.max(0, Math.ceil(milliseconds / 1000));
    }

    function formatCountdown(totalSeconds) {
      if (!Number.isFinite(totalSeconds)) return "—";
      if (totalSeconds <= 0) return "Now";

      if (totalSeconds < 600) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}m ${String(seconds).padStart(2, "0")}s`;
      }

      const totalMinutes = Math.ceil(totalSeconds / 60);
      if (totalMinutes >= 60) {
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return minutes ? `${hours}h ${minutes}m` : `${hours}h`;
      }

      return `${totalMinutes} min`;
    }

    function statusClass(totalSeconds) {
      if (totalSeconds <= 300) return "status-urgent";
      if (totalSeconds < 600) return "status-soon";
      if (totalSeconds <= 1200) return "status-medium";
      if (totalSeconds <= 1800) return "status-near";
      return "status-later";
    }


    function showToast(message, isError = false) {
      const toast = document.getElementById("notification-toast");
      if (!toast) return;

      window.clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.toggle("is-error", isError);
      toast.classList.add("is-visible");
      toastTimer = window.setTimeout(() => toast.classList.remove("is-visible"), 4200);
    }

    function loadReminders() {
      try {
        const stored = JSON.parse(localStorage.getItem(REMINDER_STORAGE_KEY) || "[]");
        if (!Array.isArray(stored)) return;

        stored.forEach(reminder => {
          if (!reminder || typeof reminder.routeId !== "string") return;
          if (!Number.isFinite(reminder.departureTimestamp)) return;
          if (![5, 10, 15].includes(reminder.thresholdMinutes)) return;
          remindersByRoute.set(reminder.routeId, reminder);
        });
      } catch (error) {
        console.warn("Saved bus reminders could not be loaded.", error);
      }
    }

    function saveReminders() {
      try {
        localStorage.setItem(
          REMINDER_STORAGE_KEY,
          JSON.stringify([...remindersByRoute.values()])
        );
      } catch (error) {
        console.warn("Bus reminders could not be saved.", error);
      }
    }

    async function registerNotificationServiceWorker(showError = false) {
      if (serviceWorkerRegistration) return serviceWorkerRegistration;
      if (!window.isSecureContext || !("serviceWorker" in navigator)) return null;

      try {
        serviceWorkerRegistration = await navigator.serviceWorker.register("./service-worker.js", {
          scope: "./"
        });
        return serviceWorkerRegistration;
      } catch (error) {
        console.warn("Notification service worker registration failed.", error);
        if (showError) {
          showToast("Notifications need this page to be served over HTTPS with service-worker.js in the same folder.", true);
        }
        return null;
      }
    }

    async function ensureNotificationPermission() {
      if (!("Notification" in window)) {
        showToast("This browser does not support web notifications.", true);
        return false;
      }

      if (!window.isSecureContext) {
        showToast("Mobile notifications require HTTPS or localhost. They cannot run directly from a file:// page.", true);
        return false;
      }

      let permission = Notification.permission;
      if (permission === "default") {
        try {
          permission = await Notification.requestPermission();
        } catch (error) {
          console.warn("Notification permission request failed.", error);
          showToast("The notification permission request could not be completed.", true);
          return false;
        }
      }

      if (permission !== "granted") {
        const message = permission === "denied"
          ? "Notifications are blocked. Enable them for this site in your browser settings."
          : "Notification permission was not enabled.";
        showToast(message, true);
        return false;
      }

      // Mobile browsers generally require ServiceWorkerRegistration.showNotification().
      const registration = await registerNotificationServiceWorker(false);
      const likelyMobile = window.matchMedia("(pointer: coarse)").matches
        || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

      if (likelyMobile && !(registration && "showNotification" in registration)) {
        showToast("Mobile notifications require service-worker.js and HTTPS. Keep both files in the same folder on your server.", true);
        return false;
      }

      return true;
    }

    function syncReminderCard(routeId) {
      const card = document.getElementById(`card-${routeId}`);
      if (!card) return;

      const reminder = remindersByRoute.get(routeId);
      card.classList.toggle("has-reminder", Boolean(reminder));

      const indicator = card.querySelector(".reminder-indicator");
      if (reminder) {
        indicator.textContent = "🔔";
        indicator.title = `${reminder.thresholdMinutes}-minute notification active`;
        indicator.setAttribute("aria-label", `${reminder.thresholdMinutes}-minute notification active`);
      } else {
        indicator.textContent = "";
        indicator.removeAttribute("title");
        indicator.setAttribute("aria-label", "No notification active");
      }
    }

    function syncAllReminderCards() {
      document.querySelectorAll(".next-bus-card").forEach(card => {
        syncReminderCard(card.dataset.routeId);
      });
    }

    function closeCardActions(card) {
      if (!card) return;
      card.classList.remove("actions-open", "is-dragging");
      const content = card.querySelector(".card-content");
      if (content) content.style.removeProperty("transform");
    }

    function closeAllCardActions(exceptCard = null) {
      document.querySelectorAll(".next-bus-card.actions-open").forEach(card => {
        if (card !== exceptCard) closeCardActions(card);
      });
    }

    function openCardActions(card) {
      closeAllCardActions(card);
      card.classList.add("actions-open");
    }

    function getActionWidth(card) {
      return card.querySelector(".notification-actions")?.getBoundingClientRect().width || 0;
    }

    function initSwipeActions() {
      document.querySelectorAll(".next-bus-card").forEach(card => {
        const content = card.querySelector(".card-content");
        let pointerId = null;
        let startX = 0;
        let startY = 0;
        let startOffset = 0;
        let currentOffset = 0;
        let horizontalDrag = false;
        let moved = false;

        const finishDrag = event => {
          if (pointerId === null || (event.pointerId !== undefined && event.pointerId !== pointerId)) return;

          const width = getActionWidth(card);
          const deltaX = event.clientX - startX;
          const shouldOpen = horizontalDrag && (
            currentOffset < -width * 0.42
            || deltaX < -38
          );
          const shouldClose = horizontalDrag && deltaX > 38;

          card.classList.remove("is-dragging");
          content.style.removeProperty("transform");

          if (shouldClose) closeCardActions(card);
          else if (shouldOpen) openCardActions(card);
          else if (startOffset < 0) openCardActions(card);
          else closeCardActions(card);

          if (moved) {
            content.dataset.ignoreClick = "true";
            window.setTimeout(() => delete content.dataset.ignoreClick, 0);
          }

          try { content.releasePointerCapture(pointerId); } catch (_) {}
          pointerId = null;
        };

        content.addEventListener("pointerdown", event => {
          if (event.pointerType === "mouse" && event.button !== 0) return;

          closeAllCardActions(card);
          pointerId = event.pointerId;
          startX = event.clientX;
          startY = event.clientY;
          startOffset = card.classList.contains("actions-open") ? -getActionWidth(card) : 0;
          currentOffset = startOffset;
          horizontalDrag = false;
          moved = false;
          content.setPointerCapture(pointerId);
        });

        content.addEventListener("pointermove", event => {
          if (pointerId !== event.pointerId) return;

          const deltaX = event.clientX - startX;
          const deltaY = event.clientY - startY;

          if (!horizontalDrag) {
            if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 8) return;
            if (Math.abs(deltaX) < 7) return;
            horizontalDrag = true;
            card.classList.add("is-dragging");
          }

          event.preventDefault();
          moved = true;
          const width = getActionWidth(card);
          currentOffset = Math.max(-width, Math.min(0, startOffset + deltaX));
          content.style.transform = `translateX(${currentOffset}px)`;
        });

        content.addEventListener("pointerup", finishDrag);
        content.addEventListener("pointercancel", finishDrag);

        content.addEventListener("click", event => {
          if (content.dataset.ignoreClick === "true") {
            event.preventDefault();
            return;
          }
          if (card.classList.contains("actions-open")) closeCardActions(card);
        });

        content.addEventListener("keydown", event => {
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            openCardActions(card);
          } else if (event.key === "ArrowRight" || event.key === "Escape") {
            event.preventDefault();
            closeCardActions(card);
          }
        });

        card.querySelectorAll(".reminder-action").forEach(button => {
          button.addEventListener("click", async event => {
            event.stopPropagation();
            const minutes = Number(button.dataset.minutes);
            await setRouteReminder(card, minutes);
          });
        });

        card.querySelector(".reminder-cancel").addEventListener("click", event => {
          event.stopPropagation();
          cancelRouteReminder(card);
        });
      });

      document.addEventListener("pointerdown", event => {
        if (!event.target.closest(".next-bus-card")) closeAllCardActions();
      });
    }

    function setReminderButtonsDisabled(card, disabled) {
      card.querySelectorAll(".reminder-action, .reminder-cancel").forEach(button => {
        button.disabled = disabled;
      });
    }

    async function setRouteReminder(card, thresholdMinutes) {
      if (![5, 10, 15].includes(thresholdMinutes)) return;

      const routeIndex = Number(card.dataset.routeIndex);
      const route = routes[routeIndex];
      if (!route) return;

      setReminderButtonsDisabled(card, true);
      try {
        const permissionEnabled = await ensureNotificationPermission();
        if (!permissionEnabled) return;

        const now = new Date();
        const next = getUpcomingDepartures(route, now, 1)[0];
        if (!next) {
          showToast(`No upcoming departure was found for ${route.line}.`, true);
          return;
        }

        const routeId = card.dataset.routeId;
        const reminder = {
          routeId,
          routeIndex,
          line: route.line,
          departureTimestamp: next.date.getTime(),
          thresholdMinutes,
          notified: false,
          createdAt: Date.now()
        };

        remindersByRoute.set(routeId, reminder);
        saveReminders();
        syncReminderCard(routeId);
        closeCardActions(card);

        const remainingSeconds = secondsUntil(next.date, now);
        if (remainingSeconds <= thresholdMinutes * 60) {
          showToast(`${route.line} is already within ${thresholdMinutes} minutes. Notifying now.`);
        } else {
          showToast(`Notification set for ${route.line} at ${thresholdMinutes} minutes before ${formatDeparture(next.date, now)}.`);
        }

        await checkReminders(now);
      } finally {
        setReminderButtonsDisabled(card, false);
      }
    }

    function cancelRouteReminder(card) {
      const routeId = card.dataset.routeId;
      const reminder = remindersByRoute.get(routeId);
      remindersByRoute.delete(routeId);
      saveReminders();
      syncReminderCard(routeId);
      closeCardActions(card);
      showToast(reminder ? `Notification cancelled for ${reminder.line}.` : "Notification cancelled.");
    }

    async function displayBusNotification(reminder, now) {
      if (!("Notification" in window) || Notification.permission !== "granted") return false;

      const departure = new Date(reminder.departureTimestamp);
      const remainingSeconds = secondsUntil(departure, now);
      const title = `${reminder.line}: ${formatCountdown(remainingSeconds)} to departure`;
      const options = {
        body: `Departs at ${formatDeparture(departure, now)}.`,
        tag: `ajman-bus-${reminder.routeId}-${reminder.departureTimestamp}`,
        renotify: false,
        timestamp: reminder.departureTimestamp,
        vibrate: [180, 100, 180],
        data: { url: window.location.href }
      };

      try {
        const registration = serviceWorkerRegistration || await registerNotificationServiceWorker(false);
        if (registration && "showNotification" in registration) {
          await registration.showNotification(title, options);
        } else {
          const notification = new Notification(title, options);
          notification.onclick = () => {
            window.focus();
            notification.close();
          };
        }

        if ("vibrate" in navigator) navigator.vibrate([180, 100, 180]);
        return true;
      } catch (error) {
        console.warn("Bus notification could not be displayed.", error);
        showToast("The notification could not be displayed. Keep this page open and check browser notification settings.", true);
        return false;
      }
    }

    async function checkReminders(now = new Date()) {
      if (reminderCheckInProgress) return;
      reminderCheckInProgress = true;
      let changed = false;

      try {
        for (const [routeId, reminder] of [...remindersByRoute.entries()]) {
          const departure = new Date(reminder.departureTimestamp);

          if (!Number.isFinite(departure.getTime()) || departure <= now) {
            remindersByRoute.delete(routeId);
            syncReminderCard(routeId);
            changed = true;
            continue;
          }

          const triggerTimestamp = reminder.departureTimestamp - reminder.thresholdMinutes * 60 * 1000;
          if (!reminder.notified && now.getTime() >= triggerTimestamp) {
            const delivered = await displayBusNotification(reminder, now);
            if (delivered) {
              reminder.notified = true;
              remindersByRoute.set(routeId, reminder);
              syncReminderCard(routeId);
              changed = true;
            }
          }
        }
      } finally {
        if (changed) saveReminders();
        reminderCheckInProgress = false;
      }
    }

    function renderDashboard() {
      const dashboard = document.getElementById("dashboard");

      routes.forEach((route, index) => {
        const id = routeDomId(route, index);
        dashboard.insertAdjacentHTML("beforeend", `
          <article
            class="next-bus-card status-none"
            id="card-${id}"
            data-route-id="${id}"
            data-route-index="${index}"
            title="Swipe left to set a notification for ${escapeHtml(route.line)}"
          >
            <div class="notification-actions" aria-label="${escapeHtml(route.line)} notification controls">
              <div class="reminder-options">
                <button type="button" class="reminder-action" data-minutes="5" aria-label="Notify me 5 minutes before ${escapeHtml(route.line)} departs">
                  <span>Notify</span><strong>5 min</strong>
                </button>
                <button type="button" class="reminder-action" data-minutes="10" aria-label="Notify me 10 minutes before ${escapeHtml(route.line)} departs">
                  <span>Notify</span><strong>10 min</strong>
                </button>
                <button type="button" class="reminder-action" data-minutes="15" aria-label="Notify me 15 minutes before ${escapeHtml(route.line)} departs">
                  <span>Notify</span><strong>15 min</strong>
                </button>
              </div>
              <button type="button" class="reminder-cancel" aria-label="Cancel notification for ${escapeHtml(route.line)}">
                Cancel notification
              </button>
            </div>
            <div class="card-content" tabindex="0" role="group" aria-label="${escapeHtml(route.line)}. Swipe left for notification options">
              <h3 class="route-name">${escapeHtml(route.line)}</h3>
              <div class="compact-departure next-departure">
                <span class="compact-label">Next</span>
                <time class="compact-time next-time">Checking…</time>
                <span class="countdown-badge next-countdown">—</span>
                <span class="reminder-indicator" aria-label="Notification active"></span>
              </div>
              <div class="compact-departure following-departure">
                <span class="compact-label">Then</span>
                <time class="compact-time following-time">Checking…</time>
              </div>
            </div>
          </article>
        `);
      });
    }

    function renderTable() {
      const tbody = document.getElementById("bus-table-body");

      routes.forEach((route, routeIndex) => {
        const id = routeDomId(route, routeIndex);
        const collapseId = `schedule-${id}`;
        const scheduleGroups = route.schedules.map((schedule, scheduleIndex) => {
          const externalLink = schedule.link && schedule.link !== "#"
            ? `<a class="btn btn-sm btn-outline-secondary" href="${escapeHtml(schedule.link)}" target="_blank" rel="noopener">Source</a>`
            : "";

          const timeChips = schedule.times.map(time => `
            <time class="time-chip" data-time="${escapeHtml(time)}">${escapeHtml(time)}</time>
          `).join("");

          return `
            <div class="schedule-group" data-route-index="${routeIndex}" data-schedule-index="${scheduleIndex}">
              <div class="schedule-title-row">
                <h3 class="schedule-title">${escapeHtml(schedule.title)}</h3>
                ${externalLink}
              </div>
              <div class="times">${timeChips}</div>
            </div>
          `;
        }).join("");

        tbody.insertAdjacentHTML("beforeend", `
          <tr>
            <td class="route-cell">${escapeHtml(route.line)}</td>
            <td class="d-none d-sm-table-cell">${escapeHtml(route.destination)}</td>
            <td class="fare-cell">${escapeHtml(route.fareCash)}</td>
            <td class="fare-cell d-none d-md-table-cell">${escapeHtml(route.fareMasar)}</td>
            <td class="text-end">
              <button
                type="button"
                class="btn btn-sm btn-outline-primary schedule-toggle"
                data-bs-toggle="collapse"
                data-bs-target="#${collapseId}"
                aria-expanded="false"
                aria-controls="${collapseId}"
              >
                View times
              </button>
            </td>
          </tr>
          <tr class="collapse schedule-details" id="${collapseId}">
            <td colspan="5">
              <div class="schedule-details-inner">${scheduleGroups}</div>
            </td>
          </tr>
        `);
      });
    }

    function updateDashboard(now = new Date()) {
      document.getElementById("current-clock").textContent = formatClockTime(now, true);
      document.getElementById("current-clock").dateTime = now.toISOString();

      routes.forEach((route, index) => {
        const card = document.getElementById(`card-${routeDomId(route, index)}`);
        if (!card) return;

        const departures = getUpcomingDepartures(route, now, 2);
        const next = departures[0];
        const following = departures[1];

        card.classList.remove(...STATUS_CLASSES, "urgent-flash");

        if (!next) {
          card.classList.add("status-none");
          card.querySelector(".next-time").textContent = "No service found";
          card.querySelector(".next-countdown").textContent = "—";
          card.querySelector(".following-time").textContent = "—";
          return;
        }

        const totalSecondsToNext = secondsUntil(next.date, now);
        const currentStatus = statusClass(totalSecondsToNext);
        const isUrgent = totalSecondsToNext <= 5 * 60;

        card.classList.add(currentStatus);
        card.classList.toggle("urgent-flash", isUrgent);

        const nextTime = card.querySelector(".next-time");
        nextTime.textContent = formatDeparture(next.date, now);
        nextTime.dateTime = next.date.toISOString();
        card.querySelector(".next-countdown").textContent = formatCountdown(totalSecondsToNext);

        const followingTime = card.querySelector(".following-time");
        if (following) {
          followingTime.textContent = formatDeparture(following.date, now);
          followingTime.dateTime = following.date.toISOString();

        } else {
          followingTime.textContent = "No later service found";
          followingTime.removeAttribute("datetime");

        }

      });
    }

    function updateTableHighlights(now = new Date()) {
      document.querySelectorAll(".schedule-group").forEach(group => {
        const routeIndex = Number(group.dataset.routeIndex);
        const scheduleIndex = Number(group.dataset.scheduleIndex);
        const schedule = routes[routeIndex].schedules[scheduleIndex];
        const serviceDate = startOfDay(now);
        const appliesToday = scheduleAppliesToDate(schedule, serviceDate);

        const chips = [...group.querySelectorAll(".time-chip")];
        chips.forEach(chip => chip.classList.remove("is-next", "is-following", "is-past"));

        if (!appliesToday) return;

        const futureChips = [];
        chips.forEach(chip => {
          const departure = timeOnServiceDate(chip.dataset.time, serviceDate, schedule);
          if (departure <= now) chip.classList.add("is-past");
          else futureChips.push(chip);
        });

        futureChips[0]?.classList.add("is-next");
        futureChips[1]?.classList.add("is-following");
      });
    }

    function initFullscreenButton() {
      const button = document.getElementById("fullscreen-button");
      const requestFullscreen = document.documentElement.requestFullscreen
        || document.documentElement.webkitRequestFullscreen;

      if (!requestFullscreen) {
        button.remove();
        return;
      }

      button.addEventListener("click", async () => {
        try {
          if (document.fullscreenElement || document.webkitFullscreenElement) {
            const exit = document.exitFullscreen || document.webkitExitFullscreen;
            await exit.call(document);
          } else {
            await requestFullscreen.call(document.documentElement);
          }
        } catch (error) {
          console.warn("Fullscreen request was not completed.", error);
        }
      });

      const syncLabel = () => {
        const isFullscreen = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
        button.textContent = isFullscreen ? "× Exit full screen" : "⛶ Full screen";
      };

      document.addEventListener("fullscreenchange", syncLabel);
      document.addEventListener("webkitfullscreenchange", syncLabel);
    }

    function init() {
      loadReminders();
      renderDashboard();
      renderTable();
      initFullscreenButton();
      initSwipeActions();
      syncAllReminderCards();

      // Registration is attempted quietly. Permission is requested only after a
      // reminder button is tapped, as required by mobile browsers.
      registerNotificationServiceWorker(false);

      const now = new Date();
      checkReminders(now);
      updateDashboard(now);
      updateTableHighlights(now);
      lastHighlightedMinute = now.getMinutes();

      window.setInterval(() => {
        const tick = new Date();
        checkReminders(tick);
        updateDashboard(tick);

        if (tick.getMinutes() !== lastHighlightedMinute) {
          updateTableHighlights(tick);
          lastHighlightedMinute = tick.getMinutes();
        }
      }, 1000);

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) checkReminders(new Date());
      });
      window.addEventListener("focus", () => checkReminders(new Date()));
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
